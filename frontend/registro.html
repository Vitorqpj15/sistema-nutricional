<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NutriTrack — Cadastro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>🥗 NutriTrack</h1>
    <p>Controle sua alimentação diária</p>
  </header>

  <main>

    <!-- ETAPA 1 — Dados de acesso -->
    <section class="card" id="etapa1">
      <h2>👤 Criar conta</h2>
      <p class="descricao">Etapa 1 de 2 — Dados de acesso</p>

      <div class="form-group">
        <input type="text" id="nome" placeholder="Seu nome completo">
        <input type="email" id="email" placeholder="Seu email">
        <input type="password" id="senha" placeholder="Crie uma senha">
        <input type="password" id="confirmarSenha" placeholder="Confirme a senha">
        <button onclick="irParaEtapa2()">Continuar →</button>
      </div>

      <p id="msgEtapa1" class="mensagem"></p>
    </section>

    <!-- ETAPA 2 — Dados físicos (começa escondida) -->
    <section class="card" id="etapa2" style="display: none">
      <h2>📊 Seus dados físicos</h2>
      <p class="descricao">Etapa 2 de 2 — Essas informações ajudam a personalizar suas metas</p>

      <div class="form-group">

        <label class="input-label">Peso atual (kg)</label>
        <input type="number" id="peso" placeholder="Ex: 75.5" step="0.1">

        <label class="input-label">Altura (cm)</label>
        <input type="number" id="altura" placeholder="Ex: 178">

        <label class="input-label">Peso objetivo (kg)</label>
        <input type="number" id="objetivoPeso" placeholder="Ex: 70.0" step="0.1">

        <label class="input-label">Meta de calorias diárias (kcal)</label>
        <input type="number" id="metaCalorias" placeholder="Ex: 2000">

        <label class="input-label">Percentual de gordura corporal (%)</label>
        <input type="number" id="percentualGordura" placeholder="Ex: 15.5" step="0.1">

        <label class="input-label">Nível de atividade física</label>
        <select id="nivelAtividade">
          <option value="">Selecione...</option>
          <option value="sedentario">Sedentário (pouco ou nenhum exercício)</option>
          <option value="leve">Leve (exercício 1-3x por semana)</option>
          <option value="moderado">Moderado (exercício 3-5x por semana)</option>
          <option value="intenso">Intenso (exercício 6-7x por semana)</option>
          <option value="muito_intenso">Muito intenso (atleta / trabalho físico)</option>
        </select>

        <div style="display: flex; gap: 10px">
          <button 
            onclick="voltarParaEtapa1()" 
            style="background-color: #777; flex: 1"
          >← Voltar</button>
          <button onclick="finalizarCadastro()" style="flex: 2">
            Finalizar cadastro ✓
          </button>
        </div>

      </div>

      <p id="msgEtapa2" class="mensagem"></p>
    </section>

    <p style="text-align: center; color: #777; font-size: 0.9rem; margin-top: 8px">
      Já tem conta? 
      <a href="login.html" style="color: #2e7d32; font-weight: bold">
        Faça login aqui
      </a>
    </p>

  </main>

  <script src="auth.js"></script>
</body>
</html>
